name: nexus
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
# State management.
  flutter_bloc: ^9.1.0
  # Code generator (mainly used with cubit & retrofit).
  freezed: ^2.4.5
  freezed_annotation: ^2.4.1
  # for dependency injection.
  get_it: ^8.0.3
  # Automatically generate code for converting to and from JSON by annotating Dart classes.
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  # Networking.
  dio: ^5.3.3
  retrofit: ^4.0.3
  retrofit_generator: ^9.1.5
  pretty_dio_logger: ^1.3.1
  # localization.
  intl: ^0.19.0
  easy_localization: ^3.0.3
  # for splash screen.
  flutter_native_splash: ^2.3.5
  # An SVG rendering and widget library for Flutter, which allows painting.
  flutter_svg: ^2.0.9
  # for adapting screen and font size.
  flutter_screenutil: ^5.9.0
  # plugin for Firebase Core, enabling connecting to multiple Firebase apps.
  firebase_core: ^3.13.0
  # Flutter library to load and cache network images.
  cached_network_image: ^3.3.1
  # reading and writing simple key-value pairs.
  shared_preferences: ^2.2.3
  # provides API to store data in secure storage.
  flutter_secure_storage: ^9.2.2
  # easy way to add shimmer effect.
  shimmer: ^3.0.0
  # Provides 2000 additional icons to use in your apps.
  font_awesome_flutter: ^10.8.0
  # A Flutter package to use fonts from fonts.google.com.
  google_fonts: ^6.2.1
  # Render After Effects animations natively on Flutter.
  lottie: ^3.2.0
  # Pin code input (OTP) text field.
  pinput: ^5.0.1
  # Flutter plugin for launching a URL.
  url_launcher: ^6.3.1

dev_dependencies:
  #A build system for Dart code generation and modular compilation
  build_runner: ^2.4.7
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter


flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: assets.dart
  field_prefix: null
  ignore_comments: true


flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
